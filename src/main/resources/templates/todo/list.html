<!DOCTYPE html>
<html>
<head>
    <title>Todoリスト</title>
    <meta charset="UTF-8">
<!--    <link rel="stylesheet" href="/css/post_list.css" type="text/css">-->
<!--    <script src=""></script>-->
<html xmlns:th="http://www.thymeleaf.org">
</head>
<body>
    <h1>Todoリスト</h1>
	<!-- 0件のとき -->
    <p th:if="${#lists.isEmpty(todos)}">Todoがありません。</p>

    <!-- 1件以上のとき -->
    <table th:unless="${#lists.isEmpty(todos)}">
        <thead>
            <tr>
                <th>ID</th>
                <th>内容</th>
<!--                <th>完了</th>-->
            </tr>
        </thead>
        <tbody>
            <tr th:each="todo : ${todos}">
                <td th:text="${todo.id}"></td>
                <td th:text="${todo.content}"></td>
<!--                <td th:text="${todo.completed} ? '完了' : '未完了'"></td>-->
            </tr>
        </tbody>
    </table>
    <form method="get" th:action="@{/todo/display/register}">
        <input type="submit" id="new-post-button" value="投稿画面へ">
    </form>
</body>
</html>
