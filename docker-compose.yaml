services:
  db:
    image: 'postgres:latest'
    environment:
      POSTGRES_USER: 'myuser'
      POSTGRES_PASSWORD: 'mypassword'
      POSTGRES_DB: 'mydatabase'
      TZ: 'Asia/Tokyo'
      PGTZ: 'Asia/Tokyo'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: